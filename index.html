let questions = [];
let current = 0;
let score = 0;
let answered = false;

function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function startQuiz(){
const map = new Map();
quizData.forEach(q => {
if(!map.has(q.q)) map.set(q.q,q);
});

const uniqueQuizData = Array.from(map.values());

if(uniqueQuizData.length < 50){
alert("問題数が50問未満です。quizDataを増やしてください。");
return;
}

questions = shuffle([...uniqueQuizData]).slice(0,50);
current=0;
score=0;
answered=false;

document.getElementById("startScreen").classList.add("hidden");
document.getElementById("resultScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");

showQuestion();
}

function showQuestion(){
answered=false;
const q = questions[current];

document.getElementById("progress").textContent =
`問題 ${current+1} / ${questions.length}　正解数：${score}`;

document.getElementById("question").textContent = q.q;
document.getElementById("status").textContent = "";

const choices = document.getElementById("choices");
choices.innerHTML = "";

shuffle([...q.c]).forEach(choice => {
const btn = document.createElement("button");
btn.className = "choice-btn";
btn.textContent = choice;
btn.onclick = () => answer(btn, choice, q.a);
choices.appendChild(btn);
});
}

function answer(button, selected, correct){
if(answered) return;
answered=true;

const buttons=document.querySelectorAll(".choice-btn");

buttons.forEach(btn=>{
btn.disabled=true;
if(btn.textContent===correct){
btn.classList.add("correct");
}
});

if(selected===correct){
score++;
button.classList.add("correct");
document.getElementById("status").textContent="正解！";
} else {
button.classList.add("wrong");
document.getElementById("status").textContent=`不正解！ 正解は「${correct}」`;
}

setTimeout(()=>{
current++;
if(current<questions.length){
showQuestion();
} else {
showResult();
}
},1000);
}

function showResult(){
document.getElementById("quizScreen").classList.add("hidden");
document.getElementById("resultScreen").classList.remove("hidden");
document.getElementById("resultText").textContent =
`50問中 ${score}問正解！`;
}
</script>

</body>
</html>
